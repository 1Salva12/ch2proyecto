<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Sesion.css">
    <title>Login Glamour</title>
</head>
<body>
    <div class="container">
        <header>
            <p>Te damos la bienvenida a</p>
            <h2>GLAMOUR</h2>
        </header>

        <form id="formLogin">
            <div class="input-box-outline">
                <span class="cursor">|</span>
                <input type="email" placeholder="Correo electrónico" required>
            </div>
            
            <input type="password" placeholder="Contraseña" class="input-line" required>
            
            <button type="submit" class="btn-black">Iniciar sesión</button>
            
            <div class="links-right">
                <a href="#">¿Olvidaste la contraseña?</a>
                <a href="Login.html" class="bold">Crear cuenta</a>
            </div>
        </form>
    </div>
</body>
</html>
