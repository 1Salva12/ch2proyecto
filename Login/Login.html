<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Crear Cuenta</title>
</head>
<body>
    <div class="container">
        <h1>Crear cuenta</h1>
        <form id="formRegistro">
            <div class="row-split">
                <div class="input-box-outline">
                    <span class="cursor">|</span>
                    <input type="text" placeholder="Nombre" required>
                </div>
                <input type="text" placeholder="Apellidos" class="input-line" required>
            </div>
            
            <input type="email" placeholder="Correo electrónico" class="input-line" required>
            <input type="password" placeholder="Crear contraseña" class="input-line" required>
            <input type="password" placeholder="Vuelve a escribir la contraseña" class="input-line" required>
            
            <button type="submit" class="btn-black">Crear cuenta</button>
            
            <p class="footer-text">¿Ya tienes una cuenta? <a href="Sesion.html">Inicia sesión</a></p>
        </form>
    </div>
</body>
</html>
