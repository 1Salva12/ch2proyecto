<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLAMOUR - Galería</title>
    <link rel="stylesheet" href="galeria.css">
</head>
<body>

    <header>
        <div class="logo">GLAMOUR</div>
        <nav class="nav-links">
            <a href="#">CITAS</a>
            <a href="#">ACERCA DE</a>
            <a href="#">CONTACTO</a>
            <a href="#" class="active">GALERÍA</a>
        </nav>
        <div class="header-right">
            <span class="login">INICIAR SESIÓN</span>
            <div class="social-icons">
                <span class="icon"></span> <span class="icon"> twitter </span>
                <span class="icon"> instagram </span>
            </div>
        </div>
    </header>

    <main>
        <h1 class="main-title">Galería de Nuestros Servicios</h1>

        <section class="gallery-container">
            <div class="grid-pair">
                <div class="item left">
                    <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=800" alt="Labios">
                    <p class="caption">LEYENDA DE LA IMAGEN</p>
                </div>
                <div class="item right">
                    <img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796?q=80&w=800" alt="Rimel">
                    <p class="caption">LEYENDA DE LA IMAGEN</p>
                </div>
            </div>

            <div class="item center">
                <img src="https://images.unsplash.com/photo-1560750588-73207b1ef5b8?q=80&w=1000" alt="Cejas">
                <p class="caption">LEYENDA DE LA IMAGEN</p>
            </div>

            <div class="item offset-left">
                <img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?q=80&w=800" alt="Ojo">
                <p class="caption">LEYENDA DE LA IMAGEN</p>
            </div>

            <div class="hero-bottom">
                <div class="full-img-container">
                    <p class="caption top-caption">LEYENDA DE LA IMAGEN</p>
                    <img src="https://images.unsplash.com/photo-1594465919760-441fe5908ab0?q=80&w=1200" alt="Modelo">
                </div>
                
                <div class="cta-area">
                    <h2 class="hero-text">Estilo para <em>todo tipo</em> de Persona.</h2>
                    <button class="btn-empezar">EMPEZAR</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="black-footer"></footer>

</body>
</html>
